# Varys File Agent configuration
#
# Copy this file to  <notebook_dir>/.jupyter-assistant/config/agent.cfg
# and edit as needed.  All values shown below are the built-in defaults.
#
# Alternatively, export the corresponding environment variables before
# starting JupyterLab (e.g. in your shell profile or a .env file).

[agent]
# Master switch — set to true to enable the /file_agent commands.
# Requires ANTHROPIC_API_KEY and ANTHROPIC_CHAT_MODEL to be configured.
VARYS_AGENT_ENABLED=false

# Maximum number of agentic turns per /file_agent request.
VARYS_AGENT_MAX_TURNS=20

# Maximum output tokens per Anthropic API call.
VARYS_AGENT_MAX_TOKENS=8192

# Comma-separated list of tools available to /file_agent.
# Valid values: Read, Write, Edit, Bash
# /file_agent_find always uses Read only (hardcoded).
# /file_agent_save always uses Read,Write (hardcoded).
VARYS_AGENT_ALLOWED_TOOLS=Read,Write,Edit

# Override the working directory for file operations.
# Defaults to the notebook's parent directory when left blank.
VARYS_AGENT_WORKING_DIR=

[background_scan]
# Enable automatic background project scan when a notebook is opened.
VARYS_AGENT_BACKGROUND_SCAN=true

# Maximum agentic turns used during a background project scan.
VARYS_AGENT_SCAN_MAX_TURNS=5

[context]
# Enable cell-level context enrichment from the project scan summary.
VARYS_AGENT_CELL_ENRICHMENT=true

# Maximum characters included from a single Python module file.
VARYS_AGENT_MODULE_CHAR_LIMIT=3000

# Token budget for injected project context into regular chat requests.
VARYS_AGENT_CONTEXT_TOKEN_BUDGET=800

[display]
# File content size limit (bytes) for inline diff rendering in the UI.
# Files larger than this threshold will have their diff fetched on demand.
VARYS_AGENT_DIFF_INLINE_LIMIT=50000
