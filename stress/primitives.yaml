- id: file_ops.create_notebook
  category: file_ops
  description: Create a new Jupyter notebook via the JupyterLab file browser.
  preconditions: []
  postconditions:
  - notebook_open
  invocation:
    type: jupyter_command
    command: notebook:create-new
  parameters: []
- id: file_ops.delete_file
  category: file_ops
  description: Delete a file from the Jupyter workspace via the file browser context menu.
  preconditions:
  - file_exists:{path}
  postconditions: []
  invocation:
    type: playwright
    steps:
    - action: click
      selector: .jp-DirListing-item[title='{path}']
    - action: click
      selector: .jp-ContextMenu li[data-command='filebrowser:delete']
  parameters:
  - name: path
    type: file_path
    required: true
    example: old_data.csv
- id: file_ops.open_notebook
  category: file_ops
  description: Open an existing notebook by path in JupyterLab.
  preconditions:
  - file_exists:{path}
  postconditions:
  - notebook_open
  invocation:
    type: playwright
    steps:
    - action: click
      selector: .jp-DirListing-item[title='{path}']
  parameters:
  - name: path
    type: file_path
    required: true
    example: analysis.ipynb
- id: file_ops.upload_file
  category: file_ops
  description: Upload a local file to the Jupyter workspace via the file browser upload button.
  preconditions: []
  postconditions: []
  invocation:
    type: playwright
    steps:
    - action: upload
      selector: input.jp-ToolbarButtonComponent[title='Upload Files']
      content: '{local_path}'
  parameters:
  - name: local_path
    type: file_path
    required: true
    example: /tmp/data.csv
- id: notebook_ops.close
  category: notebook_ops
  description: Close the current notebook tab.
  preconditions:
  - notebook_open
  postconditions: []
  invocation:
    type: jupyter_command
    command: docmanager:close
  parameters: []
- id: notebook_ops.save
  category: notebook_ops
  description: Save the current notebook.
  preconditions:
  - notebook_open
  postconditions: []
  invocation:
    type: jupyter_command
    command: docmanager:save
  parameters: []
